<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aircode 플랫폼사업팀 프로젝트</title>
    <style>
        :root { --primary: #3b82f6; --bg: #111827; --card: #1f2937; }
        body { background: var(--bg); color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: 'Pretendard', sans-serif; }
        .card { background: var(--card); padding: 40px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); text-align: center; width: 350px; }
        .logo { font-size: 24px; font-weight: 800; margin-bottom: 10px; color: var(--primary); }
        .desc { color: #9ca3af; font-size: 14px; margin-bottom: 30px; line-height: 1.5; }
        .btn { display: block; width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.2s; text-decoration: none; }
        .btn-internal { background: var(--primary); color: white; }
        .btn-external { background: #374151; color: #d1d5db; }
        .btn:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .footer { margin-top: 20px; font-size: 12px; color: #4b5563; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">AIRCODE</div>
        <div class="desc">현재 접속하신 네트워크 환경에 맞는<br>접속 방식을 선택해 주세요.</div>
        
        <a href="https://193.200.10.37:16080/dashboard.html" class="btn btn-internal">사내망 접속 (사무실)</a>
        <a href="http://aircode-dashboard.duckdns.org:16080/dashboard.html" class="btn btn-external">사외망 접속 (LTE/외부)</a>
        
        <div class="footer">플랫폼사업팀 프로젝트 관리툴</div>
    </div>
</body>
</html>
